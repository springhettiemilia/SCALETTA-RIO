<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCALETTA - tRIO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root {
            --grigio-tortora: #8e8781;
            --rosa-pastello: #f4cfdf;
            --blu-pastello: #b1dafb;
            --bianco: #fdfdfd;
            --scuro: #4a4541;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--grigio-tortora);
            margin: 0;
            padding: 15px;
            color: #333;
        }

        header {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-style: italic;
            margin: 0;
            color: var(--scuro);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
        }

        .timer-box, .total-time-box {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
        }

        #searchBar {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0 20px 0;
            border-radius: 25px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            background-color: var(--scuro);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.8; }

        /* Stile Card con Handle per trascinamento */
        .song-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 40px 2fr 1fr 1fr 1fr;
            gap: 10px;
            cursor: pointer;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .drag-handle {
            color: #ccc;
            cursor: grab;
            font-size: 24px;
            text-align: center;
            user-select: none;
        }

        /* Pagina Editor */
        #editorPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bianco);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row input {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Editor di testo con evidenziazione parziale */
        #textContent {
            width: 100%;
            min-height: 50vh;
            padding: 20px;
            font-size: 18px;
            line-height: 1.6;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
            background: white;
            outline: none;
            margin-bottom: 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: var(--bianco);
            padding: 10px 0;
            z-index: 10;
        }

        .save-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        /* Placeholder per il div editabile */
        #textContent:empty:before {
            content: attr(placeholder);
            color: #aaa;
        }
    </style>
</head>
<body>

<div id="homePage">
    <header>
        <h1>SCALETTA - tRIO</h1>
        <div class="stats-bar">
            <div class="timer-box">Timer: <span id="timerDisplay">00:00:00</span></div>
            <div class="total-time-box">Totale: <span id="totalDuration">0</span> min</div>
        </div>
        <button class="btn" style="margin-top:15px; background:#444;" onclick="toggleTimer()">Avvia/Ferma Concerto</button>
    </header>

    <input type="text" id="searchBar" placeholder="Cerca una canzone..." onkeyup="renderSongs()">
    
    <button class="btn" style="width: 100%; margin-bottom: 20px; font-weight: bold;" onclick="openEditor()">+ INSERISCI NUOVO BRANO</button>

    <div id="songList"></div>
</div>

<div id="editorPage">
    <div style="margin-bottom: 20px;">
        <button class="btn" onclick="closeEditor()">← Indietro</button>
    </div>

    <div class="input-row">
        <input type="text" id="inTitolo" placeholder="Titolo della canzone">
        <input type="text" id="inAutore" placeholder="Autore">
        <input type="text" id="inTonalita" placeholder="Tonalità">
        <input type="number" id="inDurata" placeholder="Durata (es 3.5)" step="any">
    </div>

    <div class="toolbar">
        <button class="btn" style="background:var(--blu-pastello); color:#333;" onclick="highlightSelection('var(--blu-pastello)')">Evidenzia Blu</button>
        <button class="btn" style="background:var(--rosa-pastello); color:#333;" onclick="highlightSelection('var(--rosa-pastello)')">Evidenzia Rosa</button>
        <button class="btn" style="background:#eee; color:#333;" onclick="highlightSelection('transparent')">Rimuovi Colore</button>
    </div>

    <div id="textContent" contenteditable="true" placeholder="Inserisci qui il testo della canzone..."></div>

    <div class="save-bar">
        <button class="btn" style="background:#d9534f;" onclick="deleteSong()">Elimina Brano</button>
        <button class="btn" style="background:#5cb85c; padding: 12px 40px;" onclick="saveSong()">SALVA MODIFICHE</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        databaseURL: "https://scaletta-rio-2026-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let songs = [];
    let currentSongId = null;
    let timerInterval;
    let totalSeconds = 0;

    // Inizializzazione Drag & Drop
    const el = document.getElementById('songList');
    const sortable = Sortable.create(el, {
        animation: 150,
        handle: '.drag-handle', // Solo trascinando l'iconcina si sposta
        onEnd: function() {
            saveNewOrder();
        }
    });

    function toggleTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        } else {
            timerInterval = setInterval(() => {
                totalSeconds++;
                let h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                let s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }
    }

    function loadSongs() {
        db.ref('songs').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                songs = Object.keys(data).map(key => ({id: key, ...data[key]}));
                // Ordina in base al campo "ordine" salvato nel DB
                songs.sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
            } else {
                songs = [];
            }
            renderSongs();
        });
    }

    function renderSongs() {
        const list = document.getElementById('songList');
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        let totalMin = 0;
        list.innerHTML = '';
        
        songs.forEach((s) => {
            if (s.titolo.toLowerCase().includes(searchTerm) || s.autore.toLowerCase().includes(searchTerm)) {
                let durataDecimale = parseFloat(String(s.durata).replace(',', '.')) || 0;
                totalMin += durataDecimale;

                const card = document.createElement('div');
                card.className = 'song-card';
                card.setAttribute('data-id', s.id);
                // Clicca sulla card per aprire l'editor, a meno che non clicchi sul tasto trascinamento
                card.onclick = (e) => { 
                    if(!e.target.classList.contains('drag-handle')) openEditor(s.id); 
                };

                card.innerHTML = `
                    <div class="drag-handle">☰</div>
                    <strong>${s.titolo.toUpperCase()}</strong>
                    <span>${s.autore}</span>
                    <span style="color:#d9534f; font-weight:bold;">${s.tonalita}</span>
                    <span>${durataDecimale}'</span>
                `;
                list.appendChild(card);
            }
        });
        
        let totaleFormattato = totalMin.toFixed(1).replace('.0', '').replace('.', ',');
        document.getElementById('totalDuration').innerText = totaleFormattato;
    }

    // Salva l'ordine dopo lo spostamento
    function saveNewOrder() {
        const cards = document.querySelectorAll('.song-card');
        cards.forEach((card, index) => {
            const id = card.getAttribute('data-id');
            db.ref('songs/' + id).update({ ordine: index });
        });
    }

    // Funzione Evidenziatore per selezione
    function highlightSelection(color) {
        document.execCommand('backColor', false, color);
    }

    function saveSong() {
        const title = document.getElementById('inTitolo').value;
        if (!title) { alert("Inserisci almeno il titolo!"); return; }

        let durataInput = document.getElementById('inDurata').value.toString().replace(',', '.');

        const songData = {
            titolo: title,
            autore: document.getElementById('inAutore').value || "-",
            tonalita: document.getElementById('inTonalita').value || "-",
            durata: durataInput || 0,
            // Salviamo il contenuto HTML per mantenere le evidenziazioni parziali
            testoHTML: document.getElementById('textContent').innerHTML,
            // Mantiene l'ordine esistente o lo mette in fondo se nuovo
            ordine: currentSongId ? (songs.find(x => x.id === currentSongId).ordine || 0) : songs.length
        };

        if (currentSongId) {
            db.ref('songs/' + currentSongId).set(songData);
        } else {
            db.ref('songs').push(songData);
        }
        closeEditor();
    }

    function deleteSong() {
        if (currentSongId && confirm("Sei sicuro di voler eliminare questa canzone?")) {
            db.ref('songs/' + currentSongId).remove();
            closeEditor();
        }
    }

    function openEditor(id = null) {
        currentSongId = id;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('editorPage').style.display = 'block';
        window.scrollTo(0, 0);

        if (id) {
            const s = songs.find(x => x.id === id);
            document.getElementById('inTitolo').value = s.titolo;
            document.getElementById('inAutore').value = s.autore;
            document.getElementById('inTonalita').value = s.tonalita;
            document.getElementById('inDurata').value = s.durata;
            
            // --- PROTEZIONE DATI ---
            // Se esiste 'testoHTML' (nuovo formato) lo carica.
            // Se esiste solo 'testo' (vecchio formato), lo carica come testo semplice.
            // Così non perdi nulla di quello che avevi scritto.
            document.getElementById('textContent').innerHTML = s.testoHTML || s.testo || "";
        } else {
            document.querySelectorAll('#editorPage input').forEach(i => i.value = '');
            document.getElementById('textContent').innerHTML = "";
        }
    }

    function closeEditor() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('editorPage').style.display = 'none';
    }

    loadSongs();
</script>

</body>
</html>
