<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCALETTA - tRIO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --grigio-tortora: #8e8781;
            --rosa-pastello: #f4cfdf;
            --blu-pastello: #b1dafb;
            --bianco: #fdfdfd;
            --scuro: #4a4541;
            --yt-red: #FF0000;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--grigio-tortora); margin: 0; padding: 15px; color: #333; }
        header { text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-family: 'Georgia', serif; font-style: italic; margin: 0; color: var(--scuro); }
        .stats-bar { display: flex; justify-content: space-around; align-items: center; margin-top: 15px; }
        .timer-box, .total-time-box { background: #f0f0f0; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 1.1em; }
        .tools-bar { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        #searchBar { width: 100%; padding: 12px 20px; margin: 10px 0 20px 0; border-radius: 25px; border: none; box-sizing: border-box; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background-color: var(--scuro); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; transition: opacity 0.2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn:active { opacity: 0.8; }
        .btn-small { padding: 8px 12px; font-size: 13px; background-color: #fdfdfd; color: var(--scuro); border: 1px solid #ccc; }
        .btn-pdf { background-color: #d9534f; color: white; }
        .btn-xlsx { background-color: #28a745; color: white; }
        .song-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 40px 2fr 1fr 1fr 40px 40px; gap: 10px; cursor: pointer; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .drag-handle { color: #ccc; cursor: grab; font-size: 24px; text-align: center; }
        .yt-link { color: var(--yt-red); font-size: 20px; text-decoration: none; display: flex; justify-content: center; align-items: center; }
        #editorPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bianco); z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .input-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .input-row input { flex: 1; min-width: 140px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .tabs-container { display: flex; margin-bottom: 0; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px 25px; cursor: pointer; background: #eee; border: none; border-radius: 10px 10px 0 0; margin-right: 5px; font-weight: bold; color: #777; }
        .tab-btn.active { background: var(--scuro); color: white; }
        .tab-content { display: none; width: 100%; min-height: 50vh; padding: 20px; font-size: 18px; line-height: 1.6; border: 1px solid #ccc; border-top: none; border-radius: 0 0 10px 10px; background: white; outline: none; overflow-y: auto; white-space: pre-wrap; box-sizing: border-box; }
        .tab-content.active { display: block; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; margin-top: 15px; position: sticky; top: 0; background: var(--bianco); padding: 10px 0; z-index: 10; }
        .save-bar { display: flex; justify-content: space-between; margin-top: 20px; padding-bottom: 40px; align-items: center; }
        .credits { text-align: right; font-size: 10px; color: #999; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div id="homePage">
    <header>
        <h1>SCALETTA - tRIO</h1>
        <div class="stats-bar">
            <div class="timer-box">Timer: <span id="timerDisplay">00:00:00</span></div>
            <div class="total-time-box">Totale: <span id="totalDuration">0</span> min</div>
        </div>
        <button class="btn" style="margin-top:15px; background:#444;" onclick="toggleTimer()">Avvia/Ferma Concerto</button>
    </header>

    <div class="tools-bar">
        <button class="btn btn-small" onclick="ordinaAlfa()">A-Z Titolo</button>
        <button class="btn btn-small" onclick="ordinaAutore()">A-Z Autore</button>
        <button class="btn btn-small btn-pdf" onclick="scaricaPDF()">Scarica PDF</button>
        <button class="btn btn-small btn-xlsx" onclick="scaricaExcelFormattato()">Esporta Excel</button>
    </div>

    <input type="text" id="searchBar" placeholder="Cerca una canzone..." onkeyup="renderSongs()">
    <button class="btn" style="width: 100%; margin-bottom: 20px; font-weight: bold;" onclick="openEditor()">+ INSERISCI NUOVO BRANO</button>
    <div id="songList"></div>
    <div class="credits">created by Emilia</div>
</div>

<div id="editorPage">
    <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 5px;">
        <button class="btn" onclick="closeEditor()">← Esci</button>
        <div style="display: flex; gap: 8px;">
            <button id="prevSongBtn" class="btn" style="background: #666; display: none;" onclick="goToPrevSong()">⏮️ Prec.</button>
            <a id="editorYtBtn" href="#" target="_blank" class="btn" style="background: var(--yt-red); display: none;">YouTube ▶️</a>
            <button id="nextSongBtn" class="btn" style="background: #333; display: none;" onclick="goToNextSong()">Pros. ⏭️</button>
        </div>
    </div>
    <div class="input-row">
        <input type="text" id="inTitolo" placeholder="Titolo">
        <input type="text" id="inAutore" placeholder="Autore">
        <input type="text" id="inTonalita" placeholder="Tonalità">
        <input type="number" id="inDurata" placeholder="Durata" step="any">
        <input type="text" id="inYoutube" placeholder="Link YouTube (URL)">
    </div>
    <div class="toolbar">
        <button class="btn" style="background:var(--blu-pastello); color:#333;" onmousedown="event.preventDefault(); applyHighlight('var(--blu-pastello)')">Evidenzia Blu</button>
        <button class="btn" style="background:var(--rosa-pastello); color:#333;" onmousedown="event.preventDefault(); applyHighlight('var(--rosa-pastello)')">Evidenzia Rosa</button>
        <button class="btn" style="background:#eee; color:#333;" onmousedown="event.preventDefault(); applyHighlight('transparent')">Rimuovi</button>
    </div>
    <div class="tabs-container">
        <div id="tabTesto" class="tab-btn active" onclick="switchTab('testo')">TESTO</div>
        <div id="tabAccordi" class="tab-btn" onclick="switchTab('accordi')">ACCORDI</div>
    </div>
    <div id="textContent" class="tab-content active" contenteditable="true"></div>
    <div id="chordContent" class="tab-content" contenteditable="true"></div>
    <div class="save-bar">
        <button class="btn" style="background:#d9534f;" onclick="deleteSong()">Elimina</button>
        <button class="btn" style="background:#5cb85c; padding: 12px 40px;" onclick="saveSong()">SALVA</button>
    </div>
    <div class="credits">created by Emilia</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://scaletta-rio-2026-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let songs = [], currentSongId = null, timerInterval, totalSeconds = 0;

    const sortable = Sortable.create(document.getElementById('songList'), { animation: 150, handle: '.drag-handle', onEnd: () => saveNewOrder() });

    function switchTab(type) {
        document.getElementById('tabTesto').classList.toggle('active', type === 'testo');
        document.getElementById('tabAccordi').classList.toggle('active', type === 'accordi');
        document.getElementById('textContent').classList.toggle('active', type === 'testo');
        document.getElementById('chordContent').classList.toggle('active', type === 'accordi');
    }

    function scaricaExcelFormattato() {
        const ws_data = [["Titolo", "Autore", "Tonalità", "Durata"]];
        songs.forEach(s => { ws_data.push([s.titolo, s.autore, s.tonalita, parseFloat(s.durata) || 0]); });
        
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        
        ws['!cols'] = [{wch: 30}, {wch: 25}, {wch: 15}, {wch: 10}];
        
        XLSX.utils.book_append_sheet(wb, ws, "Scaletta");
        XLSX.writeFile(wb, "Scaletta_tRIO.xlsx");
    }

    function scaricaPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4', compress: true });
        const margin = 20;
        const pageWidth = 210 - (margin * 2);

        songs.forEach((s, index) => {
            if (index > 0) doc.addPage();
            let y = margin;
            doc.setFont("helvetica", "bold"); doc.setFontSize(20);
            doc.text(s.titolo.toUpperCase(), margin, y);
            y += 10;
            doc.setFontSize(12); doc.setFont("helvetica", "italic");
            doc.text(`Autore: ${s.autore} | Tonalità: ${s.tonalita} | Durata: ${s.durata}'`, margin, y);
            y += 5;
            doc.line(margin, y, 210 - margin, y);
            y += 10;
            
            const renderBlock = (html, label) => {
                doc.setFont("helvetica", "bold"); doc.text(label, margin, y);
                y += 8;
                doc.setFont("helvetica", "normal");
                let text = html.replace(/<br\s*[\/]?>/gi, "\n").replace(/<\/?[^>]+(>|$)/g, "");
                const lines = doc.splitTextToSize(text, pageWidth);
                lines.forEach(line => {
                    if (y > 280) { doc.addPage(); y = margin; }
                    doc.text(line, margin, y);
                    y += 7;
                });
                y += 5;
            };

            renderBlock(s.testoHTML || "", "TESTO:");
            if (s.accordiHTML && s.accordiHTML.trim() !== "") renderBlock(s.accordiHTML, "ACCORDI:");
        });
        doc.save("scaletta-trio.pdf");
    }

    function applyHighlight(color) {
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        if (color === 'transparent') { document.execCommand('removeFormat', false, null); return; }
        const span = document.createElement('span'); span.style.backgroundColor = color;
        try { range.surroundContents(span); } catch (e) { document.execCommand('backColor', false, color); }
        sel.removeAllRanges();
    }

    function toggleTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } 
        else {
            timerInterval = setInterval(() => {
                totalSeconds++;
                let h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                let s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }
    }

    function loadSongs() {
        db.ref('songs').on('value', (snapshot) => {
            const data = snapshot.val();
            songs = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            songs.sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
            renderSongs();
        });
    }

    function renderSongs() {
        const list = document.getElementById('songList'), term = document.getElementById('searchBar').value.toLowerCase();
        let totalMin = 0; list.innerHTML = '';
        songs.forEach(s => {
            if (s.titolo.toLowerCase().includes(term) || s.autore.toLowerCase().includes(term)) {
                let d = parseFloat(String(s.durata).replace(',', '.')) || 0;
                totalMin += d;
                const card = document.createElement('div');
                card.className = 'song-card'; card.setAttribute('data-id', s.id);
                card.onclick = (e) => { if(!e.target.closest('.drag-handle') && !e.target.closest('.yt-link')) openEditor(s.id); };
                card.innerHTML = `<div class="drag-handle">☰</div><strong>${s.titolo.toUpperCase()}</strong><span>${s.autore}</span><span style="color:#d9534f; font-weight:bold;">${s.tonalita}</span>${s.youtube ? `<a href="${s.youtube}" target="_blank" class="yt-link">▶️</a>` : `<span></span>`}<span>${d}'</span>`;
                list.appendChild(card);
            }
        });
        document.getElementById('totalDuration').innerText = totalMin.toFixed(1).replace('.0', '').replace('.', ',');
    }

    function saveNewOrder() {
        document.querySelectorAll('.song-card').forEach((card, index) => { db.ref('songs/' + card.getAttribute('data-id')).update({ ordine: index }); });
    }

    function saveSong() {
        const title = document.getElementById('inTitolo').value;
        if (!title) return;
        const songData = {
            titolo: title, autore: document.getElementById('inAutore').value || "-", tonalita: document.getElementById('inTonalita').value || "-",
            durata: document.getElementById('inDurata').value.toString().replace(',', '.') || 0, youtube: document.getElementById('inYoutube').value || "",
            testoHTML: document.getElementById('textContent').innerHTML, accordiHTML: document.getElementById('chordContent').innerHTML,
            ordine: currentSongId ? (songs.find(x => x.id === currentSongId).ordine || 0) : songs.length
        };
        if (currentSongId) db.ref('songs/' + currentSongId).update(songData); else db.ref('songs').push(songData);
        closeEditor();
    }

    function openEditor(id = null) {
        currentSongId = id; document.getElementById('homePage').style.display = 'none'; document.getElementById('editorPage').style.display = 'block';
        switchTab('testo');
        const ytBtn = document.getElementById('editorYtBtn'), nextBtn = document.getElementById('nextSongBtn'), prevBtn = document.getElementById('prevSongBtn');
        if (id) {
            const sIndex = songs.findIndex(x => x.id === id), s = songs[sIndex];
            document.getElementById('inTitolo').value = s.titolo; document.getElementById('inAutore').value = s.autore;
            document.getElementById('inTonalita').value = s.tonalita; document.getElementById('inDurata').value = s.durata;
            document.getElementById('inYoutube').value = s.youtube || ""; document.getElementById('textContent').innerHTML = s.testoHTML || "";
            document.getElementById('chordContent').innerHTML = s.accordiHTML || "";
            ytBtn.href = s.youtube || "#"; ytBtn.style.display = s.youtube ? 'inline-flex' : 'none';
            prevBtn.style.display = (sIndex > 0) ? 'inline-flex' : 'none'; nextBtn.style.display = (sIndex < songs.length - 1) ? 'inline-flex' : 'none';
        } else {
            document.querySelectorAll('#editorPage input').forEach(i => i.value = ''); document.getElementById('textContent').innerHTML = ""; document.getElementById('chordContent').innerHTML = "";
            ytBtn.style.display = 'none'; nextBtn.style.display = 'none'; prevBtn.style.display = 'none';
        }
    }

    function closeEditor() { document.getElementById('homePage').style.display = 'block'; document.getElementById('editorPage').style.display = 'none'; }
    function goToNextSong() { const idx = songs.findIndex(x => x.id === currentSongId); if (idx < songs.length - 1) openEditor(songs[idx + 1].id); }
    function goToPrevSong() { const idx = songs.findIndex(x => x.id === currentSongId); if (idx > 0) openEditor(songs[idx - 1].id); }
    function deleteSong() { if (currentSongId && confirm("Eliminare?")) { db.ref('songs/' + currentSongId).remove(); closeEditor(); } }
    
    function ordinaAlfa() { songs.sort((a, b) => a.titolo.localeCompare(b.titolo)); saveNewOrder(); renderSongs(); }
    function ordinaAutore() { songs.sort((a, b) => a.autore.localeCompare(b.autore)); saveNewOrder(); renderSongs(); }

    loadSongs();
</script>
</body>
</html>
