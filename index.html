<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCALETTA - tRIO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --grigio-tortora: #8e8781;
            --rosa-pastello: #f4cfdf;
            --blu-pastello: #b1dafb;
            --bianco: #fdfdfd;
            --scuro: #4a4541;
            --yt-red: #FF0000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--grigio-tortora);
            margin: 0;
            padding: 15px;
            color: #333;
        }

        header {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-style: italic;
            margin: 0;
            color: var(--scuro);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
        }

        .timer-box, .total-time-box {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .tools-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        #searchBar {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0 20px 0;
            border-radius: 25px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            background-color: var(--scuro);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active { opacity: 0.8; }

        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
            background-color: #fdfdfd;
            color: var(--scuro);
            border: 1px solid #ccc;
        }

        .btn-pdf { background-color: #d9534f; color: white; }

        .song-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 40px 2fr 1fr 1fr 40px 40px;
            gap: 10px;
            cursor: pointer;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .drag-handle {
            color: #ccc;
            cursor: grab;
            font-size: 24px;
            text-align: center;
        }

        .yt-link {
            color: var(--yt-red);
            font-size: 20px;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #editorPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bianco);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row input {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        /* STILE TAB */
        .tabs-container {
            display: flex;
            margin-bottom: 0;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 10px 25px;
            cursor: pointer;
            background: #eee;
            border: none;
            border-radius: 10px 10px 0 0;
            margin-right: 5px;
            font-weight: bold;
            color: #777;
        }

        .tab-btn.active {
            background: var(--scuro);
            color: white;
        }

        .tab-content {
            display: none;
            width: 100%;
            min-height: 50vh;
            padding: 20px;
            font-size: 18px;
            line-height: 1.6;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 10px 10px;
            background: white;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            box-sizing: border-box;
        }

        .tab-content.active {
            display: block;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            margin-top: 15px;
            position: sticky; top: 0;
            background: var(--bianco);
            padding: 10px 0;
            z-index: 10;
        }

        .save-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-bottom: 40px;
            align-items: center;
        }

        .credits {
            text-align: right;
            font-size: 10px;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="homePage">
    <header>
        <h1>SCALETTA - tRIO</h1>
        <div class="stats-bar">
            <div class="timer-box">Timer: <span id="timerDisplay">00:00:00</span></div>
            <div class="total-time-box">Totale: <span id="totalDuration">0</span> min</div>
        </div>
        <button class="btn" style="margin-top:15px; background:#444;" onclick="toggleTimer()">Avvia/Ferma Concerto</button>
    </header>

    <div class="tools-bar">
        <button class="btn btn-small" onclick="ordinaAlfa()">A-Z Titolo</button>
        <button class="btn btn-small" onclick="ordinaAutore()">A-Z Autore</button>
        <button class="btn btn-small btn-pdf" onclick="scaricaPDF()">Scarica PDF</button>
    </div>

    <input type="text" id="searchBar" placeholder="Cerca una canzone..." onkeyup="renderSongs()">
    <button class="btn" style="width: 100%; margin-bottom: 20px; font-weight: bold;" onclick="openEditor()">+ INSERISCI NUOVO BRANO</button>
    <div id="songList"></div>
    <div class="credits">created by Emilia</div>
</div>

<div id="editorPage">
    <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 5px;">
        <button class="btn" onclick="closeEditor()">← Esci</button>
        
        <div style="display: flex; gap: 8px;">
            <button id="prevSongBtn" class="btn" style="background: #666; display: none;" onclick="goToPrevSong()">
                ⏮️ Prec.
            </button>
            <a id="editorYtBtn" href="#" target="_blank" class="btn" style="background: var(--yt-red); display: none;">
                YouTube ▶️
            </a>
            <button id="nextSongBtn" class="btn" style="background: #333; display: none;" onclick="goToNextSong()">
                Pros. ⏭️
            </button>
        </div>
    </div>

    <div class="input-row">
        <input type="text" id="inTitolo" placeholder="Titolo">
        <input type="text" id="inAutore" placeholder="Autore">
        <input type="text" id="inTonalita" placeholder="Tonalità">
        <input type="number" id="inDurata" placeholder="Durata" step="any">
        <input type="text" id="inYoutube" placeholder="Link YouTube (URL)">
    </div>

    <div class="toolbar">
        <button class="btn" style="background:var(--blu-pastello); color:#333;" onmousedown="event.preventDefault(); applyHighlight('var(--blu-pastello)')">Evidenzia Blu</button>
        <button class="btn" style="background:var(--rosa-pastello); color:#333;" onmousedown="event.preventDefault(); applyHighlight('var(--rosa-pastello)')">Evidenzia Rosa</button>
        <button class="btn" style="background:#eee; color:#333;" onmousedown="event.preventDefault(); applyHighlight('transparent')">Rimuovi</button>
    </div>

    <div class="tabs-container">
        <div id="tabTesto" class="tab-btn active" onclick="switchTab('testo')">TESTO</div>
        <div id="tabAccordi" class="tab-btn" onclick="switchTab('accordi')">ACCORDI</div>
    </div>

    <div id="textContent" class="tab-content active" contenteditable="true"></div>
    <div id="chordContent" class="tab-content" contenteditable="true"></div>

    <div class="save-bar">
        <button class="btn" style="background:#d9534f;" onclick="deleteSong()">Elimina</button>
        <button class="btn" style="background:#5cb85c; padding: 12px 40px;" onclick="saveSong()">SALVA</button>
    </div>
    <div class="credits">created by Emilia</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://scaletta-rio-2026-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let songs = [];
    let currentSongId = null;
    let timerInterval;
    let totalSeconds = 0;

    const sortable = Sortable.create(document.getElementById('songList'), {
        animation: 150,
        handle: '.drag-handle',
        onEnd: () => saveNewOrder()
    });

    // Funzione per switchare le schede
    function switchTab(type) {
        document.getElementById('tabTesto').classList.remove('active');
        document.getElementById('tabAccordi').classList.remove('active');
        document.getElementById('textContent').classList.remove('active');
        document.getElementById('chordContent').classList.remove('active');

        if(type === 'testo') {
            document.getElementById('tabTesto').classList.add('active');
            document.getElementById('textContent').classList.add('active');
        } else {
            document.getElementById('tabAccordi').classList.add('active');
            document.getElementById('chordContent').classList.add('active');
        }
    }

    function ordinaAlfa() {
        songs.sort((a, b) => a.titolo.localeCompare(b.titolo));
        renderSongs();
    }

    function ordinaAutore() {
        songs.sort((a, b) => a.autore.localeCompare(b.autore));
        renderSongs();
    }

    function scaricaPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.text("SCALETTA - tRIO", 105, 15, { align: "center" });
        let y = 35;
        doc.setFontSize(12);
        songs.forEach((s, i) => {
            if (y > 280) { doc.addPage(); y = 20; }
            doc.setFont("helvetica", "bold");
            doc.text(`${i + 1}. ${s.titolo.toUpperCase()}`, 20, y);
            doc.setFont("helvetica", "normal");
            doc.text(`${s.autore} (${s.tonalita}) - ${s.durata}'`, 130, y);
            doc.line(20, y + 2, 190, y + 2);
            y += 10;
        });
        doc.save("scaletta-trio.pdf");
    }

    function applyHighlight(color) {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;
        const range = selection.getRangeAt(0);
        if (color === 'transparent') { document.execCommand('removeFormat', false, null); return; }
        const span = document.createElement('span');
        span.style.backgroundColor = color;
        try { range.surroundContents(span); } catch (e) { document.execCommand('backColor', false, color); }
        selection.removeAllRanges();
    }

    function toggleTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } 
        else {
            timerInterval = setInterval(() => {
                totalSeconds++;
                let h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                let s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }
    }

    function loadSongs() {
        db.ref('songs').on('value', (snapshot) => {
            const data = snapshot.val();
            songs = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            songs.sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
            renderSongs();
        });
    }

    function renderSongs() {
        const list = document.getElementById('songList');
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        let totalMin = 0;
        list.innerHTML = '';
        
        songs.forEach((s) => {
            if (s.titolo.toLowerCase().includes(searchTerm) || s.autore.toLowerCase().includes(searchTerm)) {
                let d = parseFloat(String(s.durata).replace(',', '.')) || 0;
                totalMin += d;
                const card = document.createElement('div');
                card.className = 'song-card';
                card.setAttribute('data-id', s.id);
                card.onclick = (e) => { 
                    if(!e.target.closest('.drag-handle') && !e.target.closest('.yt-link')) openEditor(s.id); 
                };

                const ytIcon = s.youtube ? 
                    `<a href="${s.youtube}" target="_blank" class="yt-link" title="Guarda su YouTube">▶️</a>` : `<span></span>`;

                card.innerHTML = `
                    <div class="drag-handle">☰</div>
                    <strong>${s.titolo.toUpperCase()}</strong>
                    <span>${s.autore}</span>
                    <span style="color:#d9534f; font-weight:bold;">${s.tonalita}</span>
                    ${ytIcon}
                    <span>${d}'</span>
                `;
                list.appendChild(card);
            }
        });
        document.getElementById('totalDuration').innerText = totalMin.toFixed(1).replace('.0', '').replace('.', ',');
    }

    function saveNewOrder() {
        document.querySelectorAll('.song-card').forEach((card, index) => {
            db.ref('songs/' + card.getAttribute('data-id')).update({ ordine: index });
        });
    }

    function saveSong() {
        const title = document.getElementById('inTitolo').value;
        if (!title) return;
        const songData = {
            titolo: title,
            autore: document.getElementById('inAutore').value || "-",
            tonalita: document.getElementById('inTonalita').value || "-",
            durata: document.getElementById('inDurata').value.toString().replace(',', '.') || 0,
            youtube: document.getElementById('inYoutube').value || "",
            testoHTML: document.getElementById('textContent').innerHTML,
            accordiHTML: document.getElementById('chordContent').innerHTML, // Nuovo campo salvato
            ordine: currentSongId ? (songs.find(x => x.id === currentSongId).ordine || 0) : songs.length
        };
        if (currentSongId) db.ref('songs/' + currentSongId).update(songData);
        else db.ref('songs').push(songData);
        closeEditor();
    }

    function openEditor(id = null) {
        currentSongId = id;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('editorPage').style.display = 'block';
        
        // Reset alla scheda Testo ogni volta che si apre
        switchTab('testo');

        const ytBtn = document.getElementById('editorYtBtn');
        const nextBtn = document.getElementById('nextSongBtn');
        const prevBtn = document.getElementById('prevSongBtn');

        if (id) {
            const sIndex = songs.findIndex(x => x.id === id);
            const s = songs[sIndex];
            
            document.getElementById('inTitolo').value = s.titolo;
            document.getElementById('inAutore').value = s.autore;
            document.getElementById('inTonalita').value = s.tonalita;
            document.getElementById('inDurata').value = s.durata;
            document.getElementById('inYoutube').value = s.youtube || "";
            document.getElementById('textContent').innerHTML = s.testoHTML || (s.testo ? s.testo.replace(/\n/g, '<br>') : "");
            document.getElementById('chordContent').innerHTML = s.accordiHTML || ""; // Caricamento accordi
            
            if(s.youtube) {
                ytBtn.href = s.youtube;
                ytBtn.style.display = 'inline-flex';
            } else {
                ytBtn.style.display = 'none';
            }

            prevBtn.style.display = (sIndex > 0) ? 'inline-flex' : 'none';
            nextBtn.style.display = (sIndex < songs.length - 1) ? 'inline-flex' : 'none';

        } else {
            document.querySelectorAll('#editorPage input').forEach(i => i.value = '');
            document.getElementById('textContent').innerHTML = "";
            document.getElementById('chordContent').innerHTML = "";
            ytBtn.style.display = 'none';
            nextBtn.style.display = 'none';
            prevBtn.style.display = 'none';
        }
    }

    function goToNextSong() {
        if (!currentSongId) return;
        const currentIndex = songs.findIndex(x => x.id === currentSongId);
        if (currentIndex < songs.length - 1) {
            openEditor(songs[currentIndex + 1].id);
            document.getElementById('editorPage').scrollTo(0,0);
        }
    }

    function goToPrevSong() {
        if (!currentSongId) return;
        const currentIndex = songs.findIndex(x => x.id === currentSongId);
        if (currentIndex > 0) {
            openEditor(songs[currentIndex - 1].id);
            document.getElementById('editorPage').scrollTo(0,0);
        }
    }

    function deleteSong() {
        if (currentSongId && confirm("Eliminare?")) {
            db.ref('songs/' + currentSongId).remove();
            closeEditor();
        }
    }

    function closeEditor() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('editorPage').style.display = 'none';
    }

    loadSongs();
</script>
</body>
</html>
