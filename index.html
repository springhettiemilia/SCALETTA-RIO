<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Brani Musicali</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; }
        button:hover { background-color: #0056b3; }
        .btn-pdf { background-color: #dc3545; }
        .btn-pdf:hover { background-color: #a71d2a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #eee; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>

    <h2>I Miei Brani</h2>

    <div class="controls">
        <input type="text" id="titleInput" placeholder="Titolo brano">
        <input type="text" id="authorInput" placeholder="Autore">
        <button onclick="addSong()">Aggiungi</button>
    </div>

    <div class="controls">
        <label>Ordina per:</label>
        <select id="sortOrder" onchange="sortAndRender()">
            <option value="none">Data inserimento</option>
            <option value="title">Titolo (A-Z)</option>
            <option value="author">Autore (A-Z)</option>
        </select>
        <button class="btn-pdf" onclick="downloadPDF()">Scarica PDF</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Titolo</th>
                <th>Autore</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody id="playlistBody"></tbody>
    </table>

    <script>
        // Carica i dati dal localStorage all'avvio o inizializza array vuoto
        let playlist = JSON.parse(localStorage.getItem('myPlaylist')) || [];

        // Funzione per aggiungere un brano
        function addSong() {
            const title = document.getElementById('titleInput').value;
            const author = document.getElementById('authorInput').value;

            if (title === '' || author === '') {
                alert("Inserisci sia titolo che autore!");
                return;
            }

            const newSong = {
                id: Date.now(),
                title: title,
                author: author,
                dateAdded: new Date()
            };

            playlist.push(newSong);
            saveData();
            renderTable(playlist);
            
            // Pulisci input
            document.getElementById('titleInput').value = '';
            document.getElementById('authorInput').value = '';
        }

        // Funzione per salvare i dati
        function saveData() {
            localStorage.setItem('myPlaylist', JSON.stringify(playlist));
        }

        // Funzione per eliminare un brano
        function deleteSong(id) {
            playlist = playlist.filter(song => song.id !== id);
            saveData();
            sortAndRender();
        }

        // Funzione per ordinare e mostrare i dati
        function sortAndRender() {
            const criteria = document.getElementById('sortOrder').value;
            let displayList = [...playlist]; // Copia per non alterare l'ordine originale se non necessario

            if (criteria === 'title') {
                displayList.sort((a, b) => a.title.localeCompare(b.title));
            } else if (criteria === 'author') {
                displayList.sort((a, b) => a.author.localeCompare(b.author));
            }

            renderTable(displayList);
        }

        // Funzione per renderizzare la tabella HTML
        function renderTable(data) {
            const body = document.getElementById('playlistBody');
            body.innerHTML = '';

            data.forEach((song, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${song.title}</td>
                    <td>${song.author}</td>
                    <td><button onclick="deleteSong(${song.id})" style="background:#ff4444">Elimina</button></td>
                </tr>`;
                body.innerHTML += row;
            });
        }

        // Funzione per scaricare il PDF (mantiene l'ordine attuale della tabella)
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const criteria = document.getElementById('sortOrder').value;
            
            // Applichiamo lo stesso ordinamento scelto dall'utente
            let printList = [...playlist];
            if (criteria === 'title') printList.sort((a, b) => a.title.localeCompare(b.title));
            if (criteria === 'author') printList.sort((a, b) => a.author.localeCompare(b.author));

            doc.setFontSize(20);
            doc.text("Elenco Brani Musicali", 20, 20);
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text(`Ordinamento: ${criteria}`, 20, 30);
            
            doc.setDrawColor(0);
            doc.line(20, 35, 190, 35);

            let y = 45;
            doc.setTextColor(0);
            
            printList.forEach((song, index) => {
                if (y > 280) {
                    doc.addPage();
                    y = 20;
                }
                doc.text(`${index + 1}. ${song.title.toUpperCase()}`, 20, y);
                doc.text(`   Autore: ${song.author}`, 20, y + 7);
                y += 15;
            });

            doc.save("mia-playlist.pdf");
        }

        // Inizializzazione al caricamento pagina
        window.onload = () => renderTable(playlist);
    </script>
</body>
</html>
